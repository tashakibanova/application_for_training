name = "zayavka-worker"
main = "src/index.js"
compatibility_date = "2026-07-07"

# nodejs_compat подключён "на всякий случай" — как страховка совместимости для
# библиотеки xlsx (SheetJS). Сам Worker написан так, чтобы обходиться без Node
# Buffer (см. src/index.js и README.md, раздел "Известные риски"), но если
# при реальном деплое возникнут ошибки вида "Buffer is not defined" — этот флаг
# уже включён и добавлять его отдельно не нужно.
compatibility_flags = ["nodejs_compat"]

[vars]
# Домен(ы) статичной формы, которым разрешён доступ через CORS.
# Через запятую можно перечислить несколько origin, например:
# ALLOWED_ORIGIN = "https://имя-организации.github.io,https://форма.netlify.app"
# "*" разрешает любой origin — годится для быстрых тестов, но НЕ рекомендуется
# после того как форма выложена на постоянный адрес (см. README.md).
ALLOWED_ORIGIN = "*"

# Секреты (BITRIX_WEBHOOK_URL, SHEETS_WEBHOOK_URL, SHEETS_WEBHOOK_SECRET)
# НЕ хранятся здесь. Они задаются командой `wrangler secret put <ИМЯ>`
# после деплоя — см. README.md.
